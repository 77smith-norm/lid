<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lid — Lo-fi Image Dithering</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-hover: #1a1a24;
      --border: #2a2a3a;
      --text: #e0e0e8;
      --text-dim: #8888a0;
      --accent: #c084fc;
      --accent-dim: #7c3aed;
      --radius: 8px;
      --font-mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 1200px;
      padding: 2rem 2rem 1rem;
      text-align: center;
    }

    header h1 {
      font-family: var(--font-mono);
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, var(--accent), #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-dim);
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    /* ── Main Layout ──────────────────────────────────────────── */
    main {
      width: 100%;
      max-width: 1200px;
      padding: 1rem 2rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── Drop Zone ────────────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--surface);
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--surface-hover);
    }

    .drop-zone.drag-over {
      transform: scale(1.01);
    }

    .drop-zone.has-image {
      padding: 1rem;
      border-style: solid;
      border-color: var(--border);
    }

    .drop-zone p {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .drop-zone .icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      display: block;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* ── Controls ─────────────────────────────────────────────── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .control-group label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    select, button {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s;
    }

    select:hover, button:hover {
      border-color: var(--accent-dim);
    }

    select:focus, button:focus {
      outline: none;
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }

    button.primary:hover {
      background: var(--accent);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .controls .spacer { flex: 1; }

    /* ── Canvas Area ──────────────────────────────────────────── */
    .canvas-area {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 300px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      padding: 1rem;
    }

    .canvas-area canvas {
      max-width: 100%;
      height: auto;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
    }

    /* ── CSS Styling Overlay ──────────────────────────────────── */
    .style-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .style-panel .control-group input[type="color"] {
      width: 40px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      cursor: pointer;
      padding: 2px;
    }

    .style-panel .control-group input[type="range"] {
      width: 120px;
      accent-color: var(--accent);
    }

    /* ── Blend Mode Presets ───────────────────────────────────── */
    .blend-presets {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .blend-presets button {
      font-size: 0.75rem;
      padding: 0.35rem 0.6rem;
    }

    .blend-presets button.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: white;
    }

    /* ── Image Info ───────────────────────────────────────────── */
    .image-info {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      padding: 0.5rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    /* ── Footer ───────────────────────────────────────────────── */
    footer {
      width: 100%;
      max-width: 1200px;
      padding: 1rem 2rem 2rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 1.5rem 1rem 0.75rem; }
      header h1 { font-size: 1.75rem; }
      main { padding: 0.75rem 1rem 2rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .controls .spacer { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>lid</h1>
    <p>Lo-fi Image Dithering — drag an image, pick an algorithm, play with CSS</p>
  </header>

  <main>
    <!-- Drop Zone -->
    <div class="drop-zone" id="dropZone">
      <span class="icon">📂</span>
      <p>Drop an image here or click to browse</p>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp,image/gif">
    </div>

    <!-- Image Info -->
    <div class="image-info" id="imageInfo" style="display: none;">
      <span id="imageInfoText"></span>
    </div>

    <!-- Algorithm Controls -->
    <div class="controls">
      <div class="control-group">
        <label for="algorithmSelect">Algorithm</label>
        <select id="algorithmSelect">
          <option value="random">Random</option>
          <option value="bayer-0">Bayer 2×2</option>
          <option value="bayer-1">Bayer 4×4</option>
          <option value="bayer-2" selected>Bayer 8×8</option>
          <option value="bayer-3">Bayer 16×16</option>
          <option value="bayer-4">Bayer 32×32</option>
          <option value="floyd-steinberg">Floyd–Steinberg</option>
          <option value="atkinson">Atkinson</option>
          <option value="jarvis-judice-ninke">Jarvis, Judice &amp; Ninke</option>
          <option value="stucki">Stucki</option>
          <option value="sierra-2row">Sierra 2-Row</option>
          <option value="sierra-3row">Sierra 3-Row</option>
          <option value="burkes">Burkes</option>
        </select>
      </div>

      <div class="control-group">
        <label for="scaleSelect">Scale</label>
        <select id="scaleSelect">
          <option value="1">1×</option>
          <option value="2" selected>2×</option>
          <option value="4">4×</option>
          <option value="8">8×</option>
        </select>
      </div>

      <div class="spacer"></div>

      <button id="downloadBtn" class="primary" disabled>⬇ Download PNG</button>
    </div>

    <!-- Canvas -->
    <div class="canvas-area" id="canvasArea">
      <canvas id="outputCanvas"></canvas>
    </div>

    <!-- CSS Styling -->
    <div class="style-panel">
      <div class="control-group">
        <label>Overlay Color</label>
        <input type="color" id="overlayColor" value="#c084fc">
      </div>

      <div class="control-group">
        <label>Opacity</label>
        <input type="range" id="overlayOpacity" min="0" max="100" value="30">
      </div>

      <div class="control-group">
        <label>Blend Mode</label>
        <div class="blend-presets" id="blendPresets">
          <button data-mode="overlay" class="active">overlay</button>
          <button data-mode="screen">screen</button>
          <button data-mode="color-dodge">color-dodge</button>
          <button data-mode="soft-light">soft-light</button>
          <button data-mode="hard-light">hard-light</button>
          <button data-mode="exclusion">exclusion</button>
          <button data-mode="hue">hue</button>
          <button data-mode="color">color</button>
          <button data-mode="luminosity">luminosity</button>
          <button data-mode="none">none</button>
        </div>
      </div>

      <div class="control-group">
        <label>Background</label>
        <input type="color" id="bgColor" value="#0a0a0f">
      </div>

      <div class="control-group">
        <label>Gradient</label>
        <input type="checkbox" id="useGradient" checked>
      </div>
    </div>
  </main>

  <footer>
    <a href="https://github.com/77smith-norm/lid">GitHub</a> ·
    Inspired by <a href="https://rawtext.club/~sloum/lid.html" target="_blank">sloum's Lid</a> ·
    <a href="https://lowtechmagazine.com" target="_blank">Lowtech Magazine</a>
  </footer>

  <script type="module">
    // ── Import lid library ─────────────────────────────────────
    import {
      Algorithm,
      applyDither,
      renderToCanvas,
      downloadDithered,
      loadImageFile,
    } from "./lid.js";

    // ── DOM refs ───────────────────────────────────────────────
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const algorithmSelect = document.getElementById("algorithmSelect");
    const scaleSelect = document.getElementById("scaleSelect");
    const overlayColor = document.getElementById("overlayColor");
    const overlayOpacity = document.getElementById("overlayOpacity");
    const blendPresets = document.getElementById("blendPresets");
    const bgColor = document.getElementById("bgColor");
    const useGradient = document.getElementById("useGradient");
    const outputCanvas = document.getElementById("outputCanvas");
    const canvasArea = document.getElementById("canvasArea");
    const downloadBtn = document.getElementById("downloadBtn");
    const imageInfo = document.getElementById("imageInfo");
    const imageInfoText = document.getElementById("imageInfoText");

    // ── State ──────────────────────────────────────────────────
    let grayPixels = null;
    let width = 0;
    let height = 0;
    let currentBlendMode = "overlay";

    // ── Drag & Drop ────────────────────────────────────────────
    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("drag-over");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("drag-over");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file) loadImage(file);
    });

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) loadImage(file);
    });

    // ── Load Image ─────────────────────────────────────────────
    async function loadImage(file) {
      try {
        grayPixels = await loadImageFile(file);
        width = grayPixels.width;
        height = grayPixels.height;

        dropZone.classList.add("has-image");
        dropZone.querySelector("p").textContent = file.name;
        imageInfo.style.display = "block";
        imageInfoText.textContent = `${width}×${height} · ${(file.size / 1024).toFixed(1)} KB`;
        downloadBtn.disabled = false;

        render();
      } catch (err) {
        alert("Failed to load image: " + err.message);
      }
    }

    // ── Render ─────────────────────────────────────────────────
    function render() {
      if (!grayPixels) return;

      const algorithm = Algorithm[algorithmSelect.value.toUpperCase().replace(/-/g, "_")]
        || Algorithm.FLOYD_STEINBERG;

      const scaledWidth = width * parseInt(scaleSelect.value, 10);
      const scaledHeight = height * parseInt(scaleSelect.value, 10);

      outputCanvas.width = scaledWidth;
      outputCanvas.height = scaledHeight;
      outputCanvas.style.width = scaledWidth + "px";
      outputCanvas.style.height = scaledHeight + "px";

      const pixels = applyDither(grayPixels.pixels, width, height, algorithm);
      renderToCanvas(outputCanvas, pixels, width, height);

      applyStyling();
    }

    // ── CSS Styling ────────────────────────────────────────────
    function applyStyling() {
      const canvas = outputCanvas;
      const color = overlayColor.value;
      const opacity = overlayOpacity.value / 100;
      const bg = bgColor.value;
      const gradient = useGradient.checked;

      // Background
      canvasArea.style.background = bg;

      if (gradient) {
        const r1 = parseInt(color.slice(1, 3), 16);
        const g1 = parseInt(color.slice(3, 5), 16);
        const b1 = parseInt(color.slice(5, 7), 16);
        canvasArea.style.background = `
          linear-gradient(135deg,
            rgba(${r1}, ${g1}, ${b1}, ${opacity}) 0%,
            rgba(${r1}, ${g1}, ${b1}, ${opacity * 0.3}) 50%,
            transparent 100%
          )
        `;
      } else {
        canvasArea.style.background = `rgba(${parseInt(color.slice(1,3),16)}, ${parseInt(color.slice(3,5),16)}, ${parseInt(color.slice(5,7),16)}, ${opacity})`;
      }

      // Overlay canvas with blend mode
      canvas.style.mixBlendMode = currentBlendMode === "none" ? "normal" : currentBlendMode;
    }

    // ── Event Listeners ────────────────────────────────────────
    algorithmSelect.addEventListener("change", render);
    scaleSelect.addEventListener("change", render);
    overlayColor.addEventListener("input", applyStyling);
    overlayOpacity.addEventListener("input", applyStyling);
    bgColor.addEventListener("input", applyStyling);
    useGradient.addEventListener("change", applyStyling);

    blendPresets.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      blendPresets.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentBlendMode = btn.dataset.mode;
      applyStyling();
    });

    downloadBtn.addEventListener("click", () => {
      if (grayPixels) {
        downloadDithered(outputCanvas, "lid-dithered.png");
      }
    });

    // ── Paste from clipboard ───────────────────────────────────
    document.addEventListener("paste", (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith("image/")) {
          const file = item.getAsFile();
          if (file) loadImage(file);
          break;
        }
      }
    });
  </script>
</body>
</html>
